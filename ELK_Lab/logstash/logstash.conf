input {
  file {
    path => "/usr/share/logstash/ingest_data/training.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "training"
  }
  file {
    path => "/usr/share/logstash/ingest_data/drift_detection.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "drift"
  }
}

filter {
  # Parse timestamp and log level from every line
  grok {
    match => {
      "message" => "%{TIMESTAMP_ISO8601:log_timestamp} - %{LOGLEVEL:log_level} - %{GREEDYDATA:log_message}"
    }
  }

  # ── Training-specific metric extraction ──────────────────────────────────
  if [type] == "training" {
    grok {
      match => { "log_message" => "Accuracy: %{NUMBER:accuracy}" }
      tag_on_failure => []
    }
    grok {
      match => { "log_message" => "F1 Score: %{NUMBER:f1_score}" }
      tag_on_failure => []
    }
    grok {
      match => { "log_message" => "AUC-ROC: %{NUMBER:auc_roc}" }
      tag_on_failure => []
    }
    grok {
      match => { "log_message" => "Precision: %{NUMBER:precision}" }
      tag_on_failure => []
    }
    grok {
      match => { "log_message" => "Recall: %{NUMBER:recall}" }
      tag_on_failure => []
    }
    grok {
      match => { "log_message" => "FPR: %{NUMBER:false_positive_rate}" }
      tag_on_failure => []
    }
    grok {
      match => { "log_message" => "FNR: %{NUMBER:false_negative_rate}" }
      tag_on_failure => []
    }

    # Cast extracted strings to floats
    mutate {
      convert => {
        "accuracy"            => "float"
        "f1_score"            => "float"
        "auc_roc"             => "float"
        "precision"           => "float"
        "recall"              => "float"
        "false_positive_rate" => "float"
        "false_negative_rate" => "float"
      }
    }
  }

  # ── Drift-specific metric extraction ─────────────────────────────────────
  if [type] == "drift" {
    grok {
      match => { "log_message" => "Batch: %{NUMBER:batch_number}" }
      tag_on_failure => []
    }
    grok {
      match => { "log_message" => "F1 Score: %{NUMBER:f1_score}" }
      tag_on_failure => []
    }
    grok {
      match => { "log_message" => "Drift Detected: %{WORD:drift_detected}" }
      tag_on_failure => []
    }
    grok {
      match => { "log_message" => "Drift Type: %{GREEDYDATA:drift_type}" }
      tag_on_failure => []
    }

    mutate {
      convert => {
        "batch_number" => "integer"
        "f1_score"     => "float"
      }
    }
  }

  mutate {
    rename => { "log_timestamp" => "event_timestamp" }
    add_field => { "project" => "breast_cancer_classifier" }
  }
}

output {
  if [type] == "training" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "cancer-training-%{+YYYY.MM.dd}"
    }
  } else if [type] == "drift" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "cancer-drift-%{+YYYY.MM.dd}"
    }
  }

  stdout { codec => rubydebug }
}
