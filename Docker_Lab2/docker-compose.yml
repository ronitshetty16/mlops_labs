version: "3.9"

services:

  # ── Service 1: Train the model ──────────────────────────────────────────────
  model-training:
    image: python:3.11-slim
    volumes:
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt
      - model_exchange:/exchange
    working_dir: /app
    command: >
      bash -c "pip install --no-cache-dir -r requirements.txt &&
               python src/model_training.py &&
               cp wine_model.pkl /exchange/wine_model.pkl"

  # ── Service 2: Serve predictions ────────────────────────────────────────────
  serving:
    image: python:3.11-slim
    ports:
      - "80:4000"
    volumes:
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt
      - model_exchange:/exchange
    working_dir: /app
    command: >
      bash -c "pip install --no-cache-dir -r requirements.txt &&
               cp /exchange/wine_model.pkl . &&
               python src/main.py"
    depends_on:
      - model-training

volumes:
  model_exchange:
